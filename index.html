<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>z-art.top</title>
  <style>
    :root {
      --earth-size: 400px;
      --spin-duration: 80s;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #e8e8e8;
      /* subtle deep-space vignette: not pure flat black */
      background:
        radial-gradient(circle at 50% 42%, #0a0e16 0%, #05070b 45%, #000 100%);
    }

    /* Starfield (two layered, slow-drifting, dim) */
    .stars, .stars::after {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image:
        radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 90px 130px, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.5px 1.5px at 160px 80px, rgba(220,225,255,0.8), transparent),
        radial-gradient(1px 1px at 230px 200px, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 300px 50px, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.5px 1.5px at 370px 160px, rgba(230,235,255,0.7), transparent),
        radial-gradient(1px 1px at 440px 110px, rgba(255,255,255,0.6), transparent);
      background-repeat: repeat;
      background-size: 520px 520px;
      opacity: 0.35;
      z-index: 0;
    }
    .stars { animation: drift 260s linear infinite; }
    .stars::after { background-size: 360px 360px; opacity: 0.22; animation: drift 400s linear infinite reverse; }

    @keyframes drift {
      from { transform: translateY(0); }
      to   { transform: translateY(-520px); }
    }

    /* Earth */
    .scene {
      position: relative;
      z-index: 1;
      width: var(--earth-size);
      height: var(--earth-size);
      margin-bottom: 56px;
      /* faint cold halo cast onto surrounding space */
      filter: drop-shadow(0 0 60px rgba(40,90,150,0.25));
    }

    .earth {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      background:
        radial-gradient(circle at 38% 36%, #14233b 0%, #0c1626 38%, #060b14 70%, #02040a 100%);
      box-shadow:
        inset -70px -20px 120px rgba(0,0,0,0.92),   /* deep night side */
        inset 26px 22px 70px rgba(40,80,140,0.28),  /* soft sunlit-edge sheen */
        inset 0 0 30px rgba(0,0,0,0.6);
    }

    /* Rotating night-lights layer (the "Black Marble") */
    .earth::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background-image: url("https://upload.wikimedia.org/wikipedia/commons/thumb/d/db/BlackMarble_2016_01deg.jpg/1280px-BlackMarble_2016_01deg.jpg");
      background-size: 200% 100%;
      background-repeat: repeat-x;
      mix-blend-mode: screen;     /* lets only the glowing lights show, oceans stay dark */
      opacity: 0.95;
      animation: spin var(--spin-duration) linear infinite;
    }

    /* Shading mask over the sphere to keep a globe-like terminator */
    .earth::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 34%,
          rgba(0,0,0,0) 30%,
          rgba(0,0,0,0.25) 58%,
          rgba(0,0,0,0.7) 80%,
          rgba(0,0,0,0.92) 100%);
      pointer-events: none;
    }

    @keyframes spin {
      from { background-position: 0 0; }
      to   { background-position: -200% 0; }
    }

    /* Thin atmospheric rim */
    .glow {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%,
        rgba(70,140,220,0) 66%,
        rgba(80,150,235,0.30) 72%,
        rgba(50,110,200,0.10) 80%,
        rgba(0,0,0,0) 88%);
      pointer-events: none;
    }

    .title {
      z-index: 1;
      font-size: 1.7rem;
      font-weight: 200;
      letter-spacing: 0.55em;
      text-indent: 0.55em;
      color: #eef2f8;
    }

    .subtitle {
      z-index: 1;
      margin-top: 16px;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-indent: 0.3em;
      color: #5a6675;
    }

    @media (max-width: 480px) {
      :root { --earth-size: 270px; }
      .title { font-size: 1.25rem; letter-spacing: 0.4em; text-indent: 0.4em; }
    }

    @media (prefers-reduced-motion: reduce) {
      .earth::before, .stars, .stars::after { animation: none; }
    }
  </style>
</head>
<body>
  <div class="stars"></div>

  <div class="scene">
    <div class="earth">
      <div class="glow"></div>
    </div>
    <div class="glow"></div>
  </div>

  <h1 class="title">z-art</h1>
  <p class="subtitle">www.z-art.top</p>
</body>
</html>
