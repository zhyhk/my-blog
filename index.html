<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>z-art.top</title>
  <style>
    :root {
      --earth-size: 380px;
      --spin-duration: 60s;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #e8e8e8;
    }

    /* Starfield (two layered, drifting) */
    .stars, .stars::after {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image:
        radial-gradient(1px 1px at 20px 30px, #fff, transparent),
        radial-gradient(1px 1px at 90px 130px, #fff, transparent),
        radial-gradient(1.5px 1.5px at 160px 80px, #ddd, transparent),
        radial-gradient(1px 1px at 230px 200px, #fff, transparent),
        radial-gradient(1px 1px at 300px 50px, #fff, transparent),
        radial-gradient(1.5px 1.5px at 370px 160px, #eee, transparent),
        radial-gradient(1px 1px at 440px 110px, #fff, transparent);
      background-repeat: repeat;
      background-size: 500px 500px;
      opacity: 0.5;
      z-index: 0;
    }
    .stars { animation: drift 200s linear infinite; }
    .stars::after { background-size: 350px 350px; opacity: 0.3; animation: drift 320s linear infinite reverse; }

    @keyframes drift {
      from { transform: translateY(0); }
      to   { transform: translateY(-500px); }
    }

    /* Earth */
    .scene {
      position: relative;
      z-index: 1;
      width: var(--earth-size);
      height: var(--earth-size);
      margin-bottom: 48px;
    }

    .earth {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background-image: url("https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Equirectangular_projection_SW.jpg/1280px-Equirectangular_projection_SW.jpg");
      background-size: 200% 100%;
      background-repeat: repeat-x;
      box-shadow:
        inset 18px 0 28px rgba(0,0,0,0.55),      /* terminator shadow */
        inset -90px 0 90px rgba(0,0,0,0.85),     /* night side */
        inset 8px 0 16px rgba(255,255,255,0.18); /* day-side highlight */
      animation: spin var(--spin-duration) linear infinite;
    }

    @keyframes spin {
      from { background-position: 0 0; }
      to   { background-position: -200% 0; }
    }

    /* Atmospheric glow */
    .glow {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%,
        rgba(80,160,255,0) 64%,
        rgba(90,170,255,0.35) 70%,
        rgba(60,130,230,0.12) 78%,
        rgba(0,0,0,0) 85%);
      pointer-events: none;
    }

    .title {
      z-index: 1;
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.5em;
      text-indent: 0.5em;
      color: #f0f0f0;
    }

    .subtitle {
      z-index: 1;
      margin-top: 14px;
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-indent: 0.25em;
      color: #777;
    }

    @media (max-width: 480px) {
      :root { --earth-size: 260px; }
      .title { font-size: 1.2rem; letter-spacing: 0.35em; text-indent: 0.35em; }
    }

    @media (prefers-reduced-motion: reduce) {
      .earth, .stars, .stars::after { animation: none; }
    }
  </style>
</head>
<body>
  <div class="stars"></div>

  <div class="scene">
    <div class="earth"></div>
    <div class="glow"></div>
  </div>

  <h1 class="title">z-art</h1>
  <p class="subtitle">www.z-art.top</p>
</body>
</html>
